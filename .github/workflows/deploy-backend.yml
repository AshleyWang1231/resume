name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Aliyun Function Compute
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Run tests
        run: uv run pytest tests/ -x -q

      - name: Install dependencies into vendor/
        run: pip install -r requirements.txt --target vendor --platform manylinux2014_x86_64 --python-version 3.12 --only-binary=:all: --upgrade

      - name: Make bootstrap executable
        run: chmod +x bootstrap

      - name: Install Serverless Devs
        run: npm install -g @serverless-devs/s

      - name: Configure Serverless Devs credentials
        run: |
          s config add \
            --provider alibaba \
            --access aliyun \
            --AccountID ${{ secrets.ALIYUN_ACCOUNT_ID }} \
            --AccessKeyID ${{ secrets.ALIYUN_ACCESS_KEY_ID }} \
            --AccessKeySecret ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} \
            -f

      - name: Deploy to Function Compute
        run: s deploy --assume-yes
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Get endpoint URL
        run: s info
