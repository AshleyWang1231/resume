name: Deploy frontend

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "script.js"
      - "styles.css"
      - "assets/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy static site to Aliyun OSS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload files to OSS
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: |
          pip install oss2 -q
          python3 - <<'EOF'
          import oss2, os, mimetypes

          auth = oss2.Auth(os.environ['ALIYUN_ACCESS_KEY_ID'], os.environ['ALIYUN_ACCESS_KEY_SECRET'])
          bucket = oss2.Bucket(auth, 'https://oss-cn-hangzhou.aliyuncs.com', 'resume-wanglu-ashley')

          files = ['index.html', 'script.js', 'styles.css']
          for f in os.listdir('assets'):
              files.append(f'assets/{f}')

          for f in files:
              if not os.path.isfile(f):
                  continue
              mime, _ = mimetypes.guess_type(f)
              headers = {'Content-Type': mime or 'application/octet-stream'}
              result = bucket.put_object_from_file(f, f, headers=headers)
              print(f'Uploaded {f}: {result.status}')

          print('Done. Site: http://resume-wanglu-ashley.oss-cn-hangzhou.aliyuncs.com')
          EOF

      - name: Print website URL
        run: echo "Website live at http://resume-wanglu-ashley.oss-cn-hangzhou.aliyuncs.com"
