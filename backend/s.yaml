edition: 3.0.0
name: resume-agent-backend
access: aliyun

vars:
  region: cn-hangzhou

resources:
  resumeAgentApi:
    component: fc3
    props:
      region: ${vars.region}
      functionName: resume-agent-api
      runtime: custom
      handler: not-used
      customRuntimeConfig:
        command:
          - bash
          - bootstrap
      code: .
      environmentVariables:
        AI_PROVIDER: qwen
        DEEPSEEK_API_KEY: ${env(DEEPSEEK_API_KEY)}
        QWEN_API_KEY: ${env(QWEN_API_KEY)}
        QWEN_MODEL: qwen-turbo
        QWEN_BASE_URL: https://llm-9j3205gouw7wl2p6.cn-beijing.maas.aliyuncs.com/compatible-mode/v1
      triggers:
        - triggerName: defaultHttpTrigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - OPTIONS
      memorySize: 512
      timeout: 60
      instanceConcurrency: 10
